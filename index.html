<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanji Forge Support</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            padding: 40px;
            text-align: center;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }

        h1 {
            margin-top: 0;
        }

        p {
            line-height: 1.6;
        }

        a {
            color: #007AFF;
            text-decoration: none;
        }

        .button {
            display: inline-block;
            margin-top: 24px;
            padding: 12px 24px;
            background: #007AFF;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
        }

        .button:hover {
            background: #005FCC;
        }

        footer {
            margin-top: 32px;
            color: #86868b;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Kanji Forge Support</h1>

    <p>
        For support regarding the <strong>Kanji Forge</strong> application,
        please contact Adrian at
        <a href="mailto:adrianadrian198@icloud.com">adrianadrian198@icloud.com</a>.
    </p>

    <a class="button" href="privacy.html">Privacy Policy</a>

    <footer>
        © 2026 Kanji Forge
    </footer>
</div>
</body>
</html>
